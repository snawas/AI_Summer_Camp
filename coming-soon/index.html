<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4N_soUiGggkq4TxayU7O_echs7FO8ISMD5w&s" type="image/x-icon">

  <title>Coming Soon - AI Summer Camp</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto:wght@300;500&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.8; }
      to { opacity: 1; }
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: #e0e6ed;
    }

    .back-button {
      padding: 1rem 2rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease, background 0.4s ease;
      text-decoration: none;
      display: inline-block;
    }

    .back-button:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #0072ff, #00c6ff);
    }

    .features {
      text-align: left;
      margin: 2rem 0;
      background: rgba(255, 255, 255, 0.1);
      padding: 1.5rem;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .features h3 {
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 1rem;
      text-align: center;
    }

    .features ul {
      list-style: none;
      padding: 0;
    }

    .features li {
      margin: 0.8rem 0;
      padding-left: 1.5rem;
      position: relative;
    }

    .features li::before {
      content: "🚀";
      position: absolute;
      left: 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">🔮</div>
    <h1>Coming Soon!</h1>
    
    <p>
      We're working hard to bring you amazing new course materials! 
      More exciting AI adventures are on their way.
    </p>

    <div class="features">
      <h3>What's Coming Next</h3>
      <ul>
        <li>Final Project Showcase</li>
      </ul>
    </div>

    <p>
      Stay tuned for updates! In the meantime, make sure you've completed Day 1 materials.
    </p>

    <a href="../index.html" class="back-button">← Back to Home</a>
  </div>

</body>
</html>
