<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summer Camp - Day 1</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        
        .button-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .nav-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            min-width: 200px;
        }
        
        .nav-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }
        
        .nav-button.material {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .nav-button.solutions {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
        }
        
        .description {
            margin-top: 30px;
            color: #666;
            font-size: 1em;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .button-container {
                flex-direction: column;
                gap: 20px;
            }
            
            .nav-button {
                min-width: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Summer Camp</h1>
        <p class="subtitle">Day 2: Neural Networks & Computer Vision</p>
        
        <div class="button-container">
            <a href="index.html" class="nav-button material">
                📚 In-Class Material
            </a>
        </div>
        
        <div class="description">
            <p>Welcome to Day 2 of AI Summer Camp! Choose your path:</p>
            <ul style="text-align: left; display: inline-block;">
                <li><strong>In-Class Material:</strong> Interactive presentation with AI, neural networks and computer vision concepts</li>
            </li>
            </ul>
        </div>





        <div>
            <a href="../index.html" class="nav-button" style="margin-top: 30px; display: inline-block;">🔙 Back</a>
        </div>

    </div>
</body>
</html>
