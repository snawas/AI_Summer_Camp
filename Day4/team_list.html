<!DOCTYPE html>
<html lang="en">    
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team List</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

        .back-button {
      display: inline-block;
      margin-top: 40px;
      background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    .back-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }

    .team-button {
      background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
      color: white;
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
    }

    .team-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Team List</h1>
    <div class="button-container">
      <a class="team-button" href="#">Team 1</a>
      <a class="team-button" href="#">Team 2</a>
      <a class="team-button" href="#">Team 3</a>
      <a class="team-button" href="#">Team 4</a>
      <a class="team-button" href="#">Team 5</a>
      <a class="team-button" href="#">Team 6</a>
      <a class="team-button" href="#">Team 7</a>
    </div>
    <div>
        <a href="main.html" class="back-button">🔙 Back</a>
    </div>
  </div>
</body>
</html>
