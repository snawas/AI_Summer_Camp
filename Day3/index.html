<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centered Slides</title>
  <style>
    .iframe-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh; /* optional: vertically center */
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe 
      src="https://docs.google.com/presentation/d/e/2PACX-1vQ-5B0ckkn9YcUUOkImOlHcNUD3Mh53ObyxWnMLtk2i0uE9gjG83yOxQ_WieLve2LKrjR02Q6ovF0CJ/pubembed?start=false&loop=false&delayms=3000" 
      frameborder="0" 
      width="1600" 
      height="900" 
      allowfullscreen="true" 
      mozallowfullscreen="true" 
      webkitallowfullscreen="true">
    </iframe>
  </div>

</body>
</html>
